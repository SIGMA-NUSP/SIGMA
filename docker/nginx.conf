server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Upload do cartão-ponto (PDF multi-página) — acima do default (1m) do Nginx.
    client_max_body_size 30m;

    # Bundles do Angular com hash no nome — cache eterno e 404 limpo se sumir
    # (evita fallback do try_files servir index.html como JS/CSS, o que quebra
    #  navegadores com bundle antigo em cache após um deploy).
    # Sem `always` no add_header para não cachear o 404 eternamente.
    location ~* "^/(main|polyfills|styles|chunk)-[A-Z0-9]+\.(js|css)$" {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html — sempre revalidar para garantir que clientes peguem o build
    # mais recente após um deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # SPA fallback (Angular routes) — também sem cache, pois resolve para index.html
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
        try_files $uri $uri/ /index.html;
    }

    # SSE — Agenda Legislativa (sem buffering para streaming)
    location /api/agenda/stream {
        proxy_pass http://backend:8003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # Proxy para o backend
    location /api/ {
        proxy_pass http://backend:8003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI
    location /swagger-ui/ {
        proxy_pass http://backend:8003;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /v3/api-docs {
        proxy_pass http://backend:8003;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /swagger-ui.html {
        proxy_pass http://backend:8003;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
    }

    # Arquivos de mídia
    location /files/ {
        proxy_pass http://backend:8003;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
    }
}
